<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WANDILE — A Zambian Beat 'Em Up</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="wrap">
  <canvas id="game" width="480" height="270"></canvas>
  <div id="touch">
    <div id="dpad"></div>
    <div id="btns">
      <div class="tbtn" data-action="punch">P</div>
      <div class="tbtn" data-action="kick">K</div>
      <div class="tbtn" data-action="jump">J</div>
      <div class="tbtn special" data-action="special">★</div>
    </div>
    <div id="startbtn" class="tbtn" data-action="start">START</div>
  </div>
  <div id="rotate">TURN YOUR PHONE SIDEWAYS TO PLAY</div>
</div>
<script src="js/core.js"></script>
<script src="js/input.js"></script>
<script src="js/sprites.js"></script>
<script src="js/audio.js"></script>
<script src="js/entities.js"></script>
<script src="js/stages.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
